
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
svg text { font-family: var(--font-sans); }
.node-group { cursor: pointer; }
.node-group rect, .node-group circle { transition: opacity 0.15s; }
.node-group:hover rect, .node-group:hover circle { opacity: 0.82; }
.legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--color-text-secondary); }
.legend-line { height: 2px; width: 24px; border-radius: 1px; }
.pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: 500; cursor: pointer; border: none; background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-secondary); }
.pill.active-pos  { background: var(--color-background-danger);  color: var(--color-text-danger); border-color: transparent; }
.pill.active-spd  { background: var(--color-background-warning); color: var(--color-text-warning); border-color: transparent; }
.pill.active-nav  { background: var(--color-background-info);    color: var(--color-text-info); border-color: transparent; }
.pill.active-time { background: var(--color-background-success);  color: var(--color-text-success); border-color: transparent; }
.info-box { border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 10px 14px; background: var(--color-background-secondary); font-size: 13px; color: var(--color-text-secondary); min-height: 52px; line-height: 1.6; }
.info-box strong { color: var(--color-text-primary); font-weight: 500; }
</style>

<div style="padding: 4px 0 12px; display: flex; gap: 6px; flex-wrap: wrap;">
  <button class="pill active-pos" onclick="filter('pos',this)">pozycja</button>
  <button class="pill active-spd" onclick="filter('spd',this)">prędkość</button>
  <button class="pill active-nav" onclick="filter('nav',this)">kurs / status</button>
  <button class="pill active-time" onclick="filter('time',this)">czas</button>
  <button class="pill" id="pill-all" onclick="filterAll(this)" style="margin-left:4px">pokaż wszystko</button>
</div>

<script>
const allGroups = ['pos','spd','nav','time'];
let active = new Set(['pos','spd','nav','time']);

function showInfo(title, text) {
  document.getElementById('info-box').innerHTML = '<strong>' + title + '</strong> — ' + text;
}

function updateLines() {
  document.querySelectorAll('[data-group]').forEach(el => {
    el.style.opacity = active.has(el.dataset.group) ? '1' : '0.06';
  });
}

function filter(group, btn) {
  if (active.has(group) && active.size === 1) {
    active = new Set(allGroups);
    document.querySelectorAll('.pill').forEach(p => {
      const g = p.getAttribute('onclick')?.match(/'(\w+)'/)?.[1];
      if (g) p.className = 'pill active-' + g;
    });
  } else if (active.has(group) && active.size === allGroups.length) {
    active = new Set([group]);
    document.querySelectorAll('.pill').forEach(p => {
      const g = p.getAttribute('onclick')?.match(/'(\w+)'/)?.[1];
      if (g) p.className = 'pill' + (g === group ? ' active-' + g : '');
    });
  } else if (active.has(group)) {
    active.delete(group);
    btn.className = 'pill';
  } else {
    active.add(group);
    btn.className = 'pill active-' + group;
  }
  updateLines();
}

function filterAll(btn) {
  active = new Set(allGroups);
  document.querySelectorAll('.pill').forEach(p => {
    const g = p.getAttribute('onclick')?.match(/'(\w+)'/)?.[1];
    if (g) p.className = 'pill active-' + g;
  });
  updateLines();
}
</script>
